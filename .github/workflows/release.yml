name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            pgo: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            pgo: false
          - target: x86_64-apple-darwin
            os: macos-latest
            pgo: true
          - target: aarch64-apple-darwin
            os: macos-latest
            pgo: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            pgo: false
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: llvm-tools-preview

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      # --- PGO: Step 1 - Build instrumented binary ---
      - name: Build instrumented binary
        if: matrix.pgo == true
        run: |
          RUSTFLAGS="-Cprofile-generate=$PWD/pgo-data" \
            cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      # --- PGO: Step 2 - Run representative workloads ---
      - name: Generate PGO profile data
        if: matrix.pgo == true
        run: |
          BIN="target/${{ matrix.target }}/release/rx"

          $BIN --help || true
          $BIN build --help || true
          $BIN test --help || true
          $BIN fmt --help || true
          $BIN lint --help || true
          $BIN check --help || true
          $BIN clean --help || true
          $BIN pkg add --help || true
          $BIN ws --help || true
          $BIN cache status || true
          $BIN config || true
          $BIN doctor || true
          $BIN completions bash > /dev/null || true
          $BIN completions zsh > /dev/null || true
          $BIN completions fish > /dev/null || true
          $BIN insights || true
          $BIN tree --depth 2 || true
          $BIN deps || true

      # --- PGO: Step 3 - Merge profiles ---
      - name: Merge PGO profiles
        if: matrix.pgo == true
        run: |
          LLVM_PROFDATA=$(find $(rustc --print sysroot) -name llvm-profdata -type f | head -1)
          if [ -z "$LLVM_PROFDATA" ]; then
            echo "Warning: llvm-profdata not found, skipping PGO merge"
            exit 0
          fi
          $LLVM_PROFDATA merge -o pgo-merged.profdata pgo-data/

      # --- PGO: Step 4 - Rebuild with profile data ---
      - name: Build PGO-optimized binary
        if: matrix.pgo == true
        run: |
          cargo clean --release --target ${{ matrix.target }}
          RUSTFLAGS="-Cprofile-use=$PWD/pgo-merged.profdata -Cllvm-args=-pgo-warn-missing-function" \
            cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      # --- Non-PGO: Standard build ---
      - name: Build (no PGO)
        if: matrix.pgo != true
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../rx-${{ matrix.target }}.tar.gz rx
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../rx-${{ matrix.target }}.zip rx.exe
          cd ../../..

      - name: Generate checksums (Unix)
        if: runner.os != 'Windows'
        run: |
          shasum -a 256 rx-${{ matrix.target }}.tar.gz > rx-${{ matrix.target }}.tar.gz.sha256

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 rx-${{ matrix.target }}.zip).Hash.ToLower()
          "$hash  rx-${{ matrix.target }}.zip" | Out-File -Encoding ASCII rx-${{ matrix.target }}.zip.sha256

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: rx-${{ matrix.target }}
          path: |
            rx-${{ matrix.target }}.tar.gz
            rx-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: rx-${{ matrix.target }}
          path: |
            rx-${{ matrix.target }}.zip
            rx-${{ matrix.target }}.zip.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*/rx-*.tar.gz
            artifacts/*/rx-*.tar.gz.sha256
            artifacts/*/rx-*.zip
            artifacts/*/rx-*.zip.sha256
